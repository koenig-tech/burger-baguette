      }

      .bb-ssr-shell::after {
        content: "";

        inset: 0;

        align-items: center;

        min-height: 5rem;
      }

      .bb-ssr-shell__logo {

        width: auto;
      }

      .bb-ssr-shell__content {
        display: flex;
        min-height: calc(100svh - 5rem);
        align-items: center;
        padding: 4rem 0 6rem;
      }

      .bb-ssr-shell__kicker,

        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.16em;

        font-size: 0.78rem;
      }

      .bb-ssr-shell__title {

        max-width: 11ch;

        background: #c9a84c;

        padding: 0 1.6rem;

        font-size: 0.78rem;
